<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem E-Kartu MISYADA - NISN 3x4 Fix v6.4</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --sidebar-bg: #112612; --misyada-green: #2e7d32; --misyada-yellow: #fbc02d; }
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f3; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; }

        #sidebar { min-width: 260px; max-width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--misyada-yellow); }
        .nav-link { color: #bdc3c7; padding: 15px 25px; cursor: pointer; text-decoration: none; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--misyada-green); color: var(--misyada-yellow); }

        .content-area { flex-grow: 1; padding: 30px; }
        .id-card {
            width: 500px; height: 315px; background-color: #fff; border-radius: 12px;
            position: relative; overflow: hidden; border: 1px solid #ccc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-size: 100% 100%;
        }

        .photo-frame { position: absolute; background: #eee; overflow: hidden; border: 1px solid #ddd; z-index: 15; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .info-content .dot-item, .info-content .data-item { 
            position: absolute; color: #000; font-weight: 800; 
            white-space: nowrap; z-index: 15; text-transform: uppercase; font-size: 16px;
        }

        /* =========================================
           1. KALIBRASI NISN (FOTO KEMBALI 3x4)
           ========================================= */
        .mode-NISN .photo-frame { 
            width: 90px; 
            height: 120px; /* Kembali ke ukuran 3x4 */
            left: 52px; 
            top: 158px; 
            border-radius: 4px; 
        }
        .mode-NISN .dot-item { left: 245px; } 
        .mode-NISN .data-item { left: 260px; }

        .mode-NISN .row-1 { top: 154px; } 
        .mode-NISN .row-2 { top: 180px; } 
        .mode-NISN .row-3 { top: 206px; } 
        .mode-NISN .row-4 { top: 232px; } 
        .mode-NISN .row-5 { top: 258px; }

        /* =========================================
           2. KALIBRASI NUPTK (TETAP 3x5)
           ========================================= */
        .mode-NUPTK .photo-frame { width: 90px; height: 150px; left: 32px; top: 124px; border-radius: 4px; }
        .mode-NUPTK .dot-item { left: 255px; } 
        .mode-NUPTK .data-item { left: 270px; }
        
        .mode-NUPTK .row-1 { top: 122px; }
        .mode-NUPTK .row-2 { top: 147px; }
        .mode-NUPTK .row-3 { top: 172px; }
        .mode-NUPTK .row-4 { top: 197px; }
        .mode-NUPTK .row-5 { top: 222px; }
        .mode-NUPTK .row-6 { top: 247px; }

        /* =========================================
           3. KALIBRASI NRG (TETAP 3x5)
           ========================================= */
        .mode-NRG .photo-frame { width: 90px; height: 150px; left: 34px; top: 122px; border-radius: 4px; }
        .mode-NRG .dot-item { left: 225px; }
        .mode-NRG .data-item { left: 240px; }
        .mode-NRG .row-1 { top: 114px; } 
        .mode-NRG .row-2 { top: 140px; } 
        .mode-NRG .row-3 { top: 166px; } 
        .mode-NRG .row-4 { top: 192px; } 
        .mode-NRG .row-5 { top: 218px; }

        .nrg-top-number {
            display: none; position: absolute; right: 40px; top: 26px;
            font-weight: 800; font-size: 18px; color: #000; z-index: 20;
        }
        .mode-NRG .nrg-top-number { display: block; }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar">
        <div class="sidebar-header">
            <h4 class="m-0 text-warning fw-bold">MISYADA</h4>
        </div>
        <div class="nav flex-column mt-3">
            <div class="nav-link active" id="menu-NISN" onclick="switchTab('NISN', event)">KARTU NISN</div>
            <div class="nav-link" id="menu-NUPTK" onclick="switchTab('NUPTK', event)">KARTU NUPTK</div>
            <div class="nav-link" id="menu-NRG" onclick="switchTab('NRG', event)">KARTU NRG</div>
        </div>
    </nav>

    <main class="content-area">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card p-4 border-0 shadow-sm rounded-4">
                    <h5 class="fw-bold mb-3">Input Data</h5>
                    <div id="dynamic-inputs"></div>
                    <div class="mb-3">
                        <label class="small fw-bold">Foto Profil</label>
                        <input type="file" id="in-foto" class="form-control" accept="image/*">
                    </div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary fw-bold" onclick="downloadAll()">UNDUH KARTU</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div id="card-front" class="id-card mode-NISN">
                    <div id="nrg-top" class="nrg-top-number"></div>
                    <div class="photo-frame"><img id="p-img" src=""></div>
                    <div class="info-content" id="p-data-content"></div>
                </div>
                <div id="card-back" class="id-card mode-NISN" style="margin-top:20px;"></div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const backgrounds = {
        'NISN': { front: 'nisn-depan.png', back: 'nisn-belakang.png' },
        'NUPTK': { front: 'nuptk-depan.png', back: 'nuptk-belakang.png' }, 
        'NRG': { front: 'nrg-depan.png', back: 'nrg-belakang.png' }
    };

    const config = {
        'NISN': ['NISN', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Jenis Kelamin'],
        'NUPTK': ['NUPTK', 'Nama', 'Tempat Lahir', 'Tanggal', 'Kelamin', 'Satminkal'],
        'NRG': ['NRG', 'Nama', 'No. Peserta', 'Tahun Lulus', 'Mapel']
    };

    let currentMode = 'NISN';

    function switchTab(mode, event = null) {
        currentMode = mode;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        if (event) event.currentTarget.classList.add('active');
        const front = document.getElementById('card-front');
        const back = document.getElementById('card-back');
        front.className = 'id-card mode-' + mode;
        back.className = 'id-card mode-' + mode;
        front.style.backgroundImage = `url('${backgrounds[mode].front}')`;
        back.style.backgroundImage = `url('${backgrounds[mode].back}')`;
        renderInputs();
        updatePreview();
    }

    function renderInputs() {
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = '';
        config[currentMode].forEach((label) => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            container.innerHTML += `<div class="mb-2"><label class="small fw-bold">${label}</label><input type="text" id="${id}" class="form-control form-control-sm" oninput="updatePreview()"></div>`;
        });
    }

    function updatePreview() {
        const content = document.getElementById('p-data-content');
        const topNrg = document.getElementById('nrg-top');
        content.innerHTML = '';
        config[currentMode].forEach((label, index) => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            const val = document.getElementById(id)?.value || '';
            const dot = document.createElement('div');
            dot.className = `dot-item row-${index + 1}`;
            dot.innerText = ':';
            content.appendChild(dot);
            const data = document.createElement('div');
            data.className = `data-item row-${index + 1}`;
            data.innerText = val.toUpperCase();
            content.appendChild(data);
            if (currentMode === 'NRG' && label === 'NRG') topNrg.innerText = val.toUpperCase();
        });
    }

    document.getElementById('in-foto').addEventListener('change', function(e) {
        if(this.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('p-img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    async function downloadAll() {
        const canvas = await html2canvas(document.getElementById('card-front'), { scale: 3 });
        const link = document.createElement('a');
        link.download = `Kartu-${currentMode}.jpg`;
        link.href = canvas.toDataURL('image/jpeg');
        link.click();
    }

    window.onload = () => switchTab('NISN');
</script>
</body>
</html>
