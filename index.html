<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kartu MISYADA - Precision Sync v4.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --sidebar-bg: #112612; --misyada-green: #2e7d32; --misyada-yellow: #fbc02d; }
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f3; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; }
        
        #sidebar { min-width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; text-align: center; border-bottom: 3px solid var(--misyada-yellow); }
        .nav-link { color: #bdc3c7; padding: 15px 25px; cursor: pointer; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-link.active { background: var(--misyada-green); color: var(--misyada-yellow); font-weight: bold; }
        
        .content-area { flex-grow: 1; padding: 30px; }
        .card-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        
        .id-card { 
            width: 500px; height: 315px; position: relative; overflow: hidden; 
            border-radius: 12px; border: 1px solid #bbb; background-size: 100% 100%; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); background-repeat: no-repeat;
            background-color: #fff;
        }

        .photo-frame { position: absolute; background: #fff; overflow: hidden; z-index: 10; border: 1px solid #aaa; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .text-element { 
            position: absolute; 
            color: #000; 
            font-weight: 700; 
            white-space: nowrap; 
            z-index: 10; 
            letter-spacing: -0.3px; 
            text-transform: uppercase;
        }

        /* =========================================
           FIX: NISN DISAMAKAN DENGAN NUPTK (222px)
           ========================================= */
        .mode-NISN .photo-frame { width: 84px; height: 110px; left: 49px; top: 158px; }
        .mode-NISN .text-element { left: 222px; font-size: 10px; } /* Disamakan dengan NUPTK */
        .mode-NISN .row-1 { top: 163px; } 
        .mode-NISN .row-2 { top: 185px; } 
        .mode-NISN .row-3 { top: 207px; } 
        .mode-NISN .row-4 { top: 229px; } 
        .mode-NISN .row-5 { top: 251px; }

        /* =========================================
           PRESISI NUPTK
           ========================================= */
        .mode-NUPTK .photo-frame { width: 100px; height: 135px; left: 34px; top: 128px; }
        .mode-NUPTK .text-element { left: 222px; font-size: 10.5px; }
        .mode-NUPTK .row-1 { top: 128px; }
        .mode-NUPTK .row-2 { top: 149px; }
        .mode-NUPTK .row-3 { top: 170px; }
        .mode-NUPTK .row-4 { top: 191px; }
        .mode-NUPTK .row-5 { top: 212px; }
        .mode-NUPTK .row-6 { top: 233px; }

        /* =========================================
           PRESISI NRG
           ========================================= */
        .mode-NRG .photo-frame { width: 95px; height: 130px; left: 33px; top: 124px; }
        .mode-NRG .text-element { left: 235px; font-size: 11px; }
        .mode-NRG .row-1 { top: 122px; }
        .mode-NRG .row-2 { top: 146px; }
        .mode-NRG .row-3 { top: 170px; }
        .mode-NRG .row-4 { top: 194px; }
        .mode-NRG .row-5 { top: 218px; }
        
        .nrg-header-val { 
            display: none; position: absolute; right: 42px; top: 38px; 
            font-size: 13px; font-weight: 900; color: #000; 
        }
        .mode-NRG .nrg-header-val { display: block; }

        @media print {
            @page { size: portrait; margin: 0.5cm; }
            body { background: white !important; }
            #sidebar, .no-print { display: none !important; }
            .content-area { padding: 0 !important; margin: 0 !important; width: 100% !important; }
            .card-container { display: flex !important; flex-direction: column !important; align-items: center !important; width: 100% !important; }
            .id-card { 
                box-shadow: none !important; border: 1px solid #ddd !important; 
                margin-bottom: 50px !important; display: block !important;
                page-break-inside: avoid; -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>
<div class="wrapper">
    <nav id="sidebar" class="no-print">
        <div class="sidebar-header"><h4 class="text-warning fw-bold">MISYADA</h4></div>
        <div class="nav flex-column">
            <div class="nav-link active" id="btn-NISN" onclick="switchTab('NISN', event)">KARTU NISN</div>
            <div class="nav-link" id="btn-NUPTK" onclick="switchTab('NUPTK', event)">KARTU NUPTK</div>
            <div class="nav-link" id="btn-NRG" onclick="switchTab('NRG', event)">KARTU NRG</div>
        </div>
    </nav>
    <main class="content-area">
        <div class="row">
            <div class="col-lg-4 no-print mb-4">
                <div class="card p-4 shadow-sm border-0 rounded-4">
                    <h5 id="form-title" class="fw-bold mb-3">Input Data NISN</h5>
                    <div id="dynamic-inputs"></div>
                    <div class="mb-3 mt-2"><label class="small fw-bold">Pilih Foto</label><input type="file" id="in-foto" class="form-control" accept="image/*"></div>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary fw-bold" onclick="downloadAll()">UNDUH KARTU (JPG)</button>
                        <button class="btn btn-dark fw-bold" onclick="window.print()">CETAK KARTU</button>
                    </div>
                </div>
            </div>
            <div class="col-lg-8">
                <div class="card-container">
                    <div id="card-front" class="id-card mode-NISN">
                        <div id="nrg-top" class="nrg-header-val"></div>
                        <div class="photo-frame"><img id="p-img"></div>
                        <div id="text-layer"></div>
                    </div>
                    <div id="card-back" class="id-card mode-NISN"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const backgrounds = {
        'NISN': { front: 'nisn-depan.png', back: 'nisn-belakang.png' },
        'NUPTK': { front: 'nuptk-depan.png', back: 'nuptk-belakang.png' },
        'NRG': { front: 'nrg-depan.png', back: 'nrg-belakang.png' }
    };
    const config = {
        'NISN': ['NISN', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Jenis Kelamin'],
        'NUPTK': ['NUPTK', 'Nama', 'Tempat Lahir', 'Tanggal', 'Kelamin', 'Satminkal'],
        'NRG': ['NRG', 'Nama', 'No. Peserta', 'Tahun Lulus', 'Mapel']
    };
    let currentMode = 'NISN';

    function switchTab(mode, e) {
        currentMode = mode;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        if(e) e.target.classList.add('active');
        else document.getElementById('btn-' + mode).classList.add('active');
        
        const front = document.getElementById('card-front');
        const back = document.getElementById('card-back');
        front.className = 'id-card mode-' + mode;
        back.className = 'id-card mode-' + mode;
        
        const t = new Date().getTime();
        front.style.backgroundImage = `url('${backgrounds[mode].front}?t=${t}')`;
        back.style.backgroundImage = `url('${backgrounds[mode].back}?t=${t}')`;
        
        document.getElementById('form-title').innerText = 'Input Data ' + mode;
        renderForm();
    }

    function renderForm() {
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = '';
        config[currentMode].forEach(label => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            container.innerHTML += `<div class="mb-2"><label class="small fw-bold">${label}</label><input type="text" id="${id}" class="form-control form-control-sm" placeholder="Isi ${label}..." oninput="updatePreview()"></div>`;
        });
        updatePreview();
    }

    function updatePreview() {
        const layer = document.getElementById('text-layer');
        const nrgTop = document.getElementById('nrg-top');
        layer.innerHTML = '';
        config[currentMode].forEach((label, i) => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            const val = document.getElementById(id)?.value || '';
            layer.innerHTML += `<div class="text-element row-${i+1}">: ${val.toUpperCase()}</div>`;
            if(currentMode === 'NRG' && label === 'NRG') nrgTop.innerText = val.toUpperCase();
        });
    }

    document.getElementById('in-foto').onchange = function(e) {
        if(this.files && this.files[0]) {
            const reader = new FileReader();
            reader.onload = r => { 
                const img = document.getElementById('p-img'); 
                img.src = r.target.result; 
                img.style.display='block'; 
            }
            reader.readAsDataURL(this.files[0]);
        }
    }

    async function downloadAll() {
        const targets = ['card-front', 'card-back'];
        for (const id of targets) {
            const el = document.getElementById(id);
            const canvas = await html2canvas(el, { 
                scale: 3, 
                useCORS: true, 
                allowTaint: true,
                logging: false
            });
            const link = document.createElement('a');
            link.download = `${currentMode}-${id}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
            await new Promise(res => setTimeout(res, 800));
        }
    }

    window.onload = () => switchTab('NISN');
</script>
</body>
</html>
