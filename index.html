<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem E-Kartu MISYADA - Official</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar-bg: #112612;
            --misyada-green: #2e7d32;
            --misyada-yellow: #fbc02d;
        }

        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f3; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; }

        /* SIDEBAR */
        #sidebar { 
            min-width: 260px; 
            max-width: 260px; 
            background: var(--sidebar-bg); 
            color: white; 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
        }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--misyada-yellow); }
        .nav-link { color: #bdc3c7; padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: var(--misyada-green); color: var(--misyada-yellow); }

        .sidebar-footer { 
            margin-top: auto; 
            padding: 20px; 
            font-size: 11px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2);
            text-align: center;
        }

        .content-area { flex-grow: 1; padding: 30px; }

        /* KARTU CONTAINER */
        .card-container { display: flex; flex-direction: column; gap: 25px; align-items: center; }
        
        .id-card {
            width: 500px; height: 315px; background-color: #fff; border-radius: 12px;
            position: relative; overflow: hidden; border: 1px solid #ccc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-size: 100% 100%; background-repeat: no-repeat;
        }

        .card-body { position: absolute; inset: 0; padding: 0; z-index: 10; }
        .photo-frame { position: absolute; background: #eee; overflow: hidden; }
        .info-content { position: absolute; color: #000; font-weight: 800; }

        /* --- STYLING KHUSUS NRG (Double NRG Number) --- */
        .mode-NRG .photo-frame { width: 125px; height: 168px; left: 26px; top: 113px; border-radius: 8px; }
        .mode-NRG .info-content { left: 200px; top: 121px; font-size: 13px; line-height: 1.68; }
        
        /* UPDATE: Perbaikan posisi Nomor NRG Kanan Atas agar lebih ke kanan */
        .nrg-top-number {
            display: none; position: absolute;
            right: 60px; /* Digeser ke kanan dari sebelumnya 145px */
            top: 41px;
            font-weight: 800; font-size: 15px; color: #000; z-index: 20;
        }
        .mode-NRG .nrg-top-number { display: block; }

        /* --- STYLING KHUSUS NUPTK --- */
        .mode-NUPTK .photo-frame { width: 108px; height: 148px; left: 28px; top: 119px; border-radius: 4px; }
        .mode-NUPTK .info-content { left: 196px; top: 122px; font-size: 11.5px; line-height: 1.66; }

        /* --- STYLING KHUSUS NISN --- */
        .mode-NISN .photo-frame { width: 98px; height: 130px; left: 45px; top: 151px; }
        .mode-NISN .info-content { left: 155px; top: 151px; font-size: 11.5px; line-height: 1.62; }

        #card-back { background-size: 100% 100%; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="wrapper">
    <nav id="sidebar" class="no-print">
        <div class="sidebar-header">
            <h4 class="m-0 text-warning fw-bold">MISYADA</h4>
            <small class="text-white-50">SISTEM KARTU DIGITAL</small>
        </div>
        <div class="nav flex-column mt-3">
            <div class="nav-link" id="menu-NISN" onclick="switchTab('NISN', event)"><i class="fas fa-id-card me-3"></i>KARTU NISN</div>
            <div class="nav-link" id="menu-NUPTK" onclick="switchTab('NUPTK', event)"><i class="fas fa-user-tie me-3"></i>KARTU NUPTK</div>
            <div class="nav-link" id="menu-NRG" onclick="switchTab('NRG', event)"><i class="fas fa-award me-3"></i>KARTU NRG</div>
        </div>
        <div class="sidebar-footer">
            <div class="text-warning fw-bold mb-1">Developer: Galeri Famous</div>
            <div class="text-white-50">&copy; <span id="current-year"></span> MEDIA MISYADA</div>
        </div>
    </nav>

    <main class="content-area">
        <div class="row">
            <div class="col-lg-4 no-print">
                <div class="card p-4 border-0 shadow-sm rounded-4">
                    <h5 class="fw-bold mb-3" id="form-title">Input Data</h5>
                    <div id="dynamic-inputs"></div>
                    <div class="mb-4 mt-2">
                        <label class="small fw-bold">Foto Profil</label>
                        <input type="file" id="in-foto" class="form-control" accept="image/*">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="button" class="btn btn-primary fw-bold" onclick="downloadAll()"><i class="fas fa-download me-2"></i>UNDUH KARTU</button>
                        <button type="button" class="btn btn-dark fw-bold" onclick="window.print()"><i class="fas fa-print me-2"></i>CETAK</button>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card-container">
                    <div id="card-front" class="id-card">
                        <div id="nrg-top" class="nrg-top-number"></div>
                        <div class="card-body">
                            <div class="photo-frame">
                                <img id="p-img" src="" style="width:100%;height:100%;object-fit:cover;display:none;">
                            </div>
                            <div class="info-content" id="p-data-content"></div>
                        </div>
                    </div>
                    <div id="card-back" class="id-card"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    document.getElementById('current-year').textContent = new Date().getFullYear();

    const backgrounds = {
        'NISN': { front: 'nisn-depan.png', back: 'nisn-belakang.png' },
        'NUPTK': { front: 'nuptk-depan.png', back: 'nuptk-belakang.png' }, 
        'NRG': { front: 'nrg-depan.png', back: 'nrg-belakang.png' }
    };

    const config = {
        'NISN': ['NISN', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Jenis Kelamin'],
        'NUPTK': ['NUPTK', 'Nama', 'Tempat Lahir', 'Tanggal', 'Kelamin', 'Satminkal'],
        'NRG': ['NRG', 'Nama', 'No. Peserta', 'Tahun Lulus', 'Mapel']
    };

    let currentMode = 'NISN';

    function switchTab(mode, event = null) {
        currentMode = mode;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        
        if (event) {
            event.currentTarget.classList.add('active');
        } else {
            const menuEl = document.getElementById('menu-' + mode);
            if(menuEl) menuEl.classList.add('active');
        }

        document.getElementById('form-title').innerText = 'Input Data ' + mode;
        const front = document.getElementById('card-front');
        const back = document.getElementById('card-back');
        
        front.className = 'id-card mode-' + mode;
        front.style.backgroundImage = `url('${backgrounds[mode].front}')`;
        back.style.backgroundImage = `url('${backgrounds[mode].back}')`;
        
        renderInputs();
        updatePreview();
    }

    function renderInputs() {
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = '';
        config[currentMode].forEach(label => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            container.innerHTML += `
                <div class="mb-2">
                    <label class="small fw-bold">${label}</label>
                    <input type="text" id="${id}" class="form-control form-control-sm" placeholder="${label}..." oninput="updatePreview()">
                </div>`;
        });
    }

    function updatePreview() {
        const content = document.getElementById('p-data-content');
        const topNrg = document.getElementById('nrg-top');
        let html = '';
        
        config[currentMode].forEach(label => {
            const id = 'in-' + label.replace(/\s/g, '').replace('.', '');
            const inputEl = document.getElementById(id);
            const val = inputEl ? inputEl.value : '';
            
            html += `<div>: ${val.toUpperCase() || ''}</div>`;
            
            if (currentMode === 'NRG' && label === 'NRG') {
                topNrg.innerText = val.toUpperCase();
            }
        });
        
        content.innerHTML = html;
    }

    document.getElementById('in-foto').addEventListener('change', function(e) {
        if(this.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('p-img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    async function downloadAll() {
        const sides = ['front', 'back'];
        for(let side of sides) {
            const cardEl = document.getElementById('card-' + side);
            const canvas = await html2canvas(cardEl, { 
                scale: 3, 
                useCORS: true,
                backgroundColor: null 
            });
            const link = document.createElement('a');
            link.download = `Kartu-${side}-${currentMode}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }
    }

    window.onload = () => {
        switchTab('NISN');
    };
</script>
</body>
</html>
