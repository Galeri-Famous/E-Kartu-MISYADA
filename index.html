<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem E-Kartu MISYADA - Versi 1</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --sidebar-bg: #112612; --misyada-green: #2e7d32; --misyada-yellow: #fbc02d; }
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f3; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; flex-direction: column; }
        .main-container { display: flex; flex-grow: 1; }

        /* SIDEBAR */
        #sidebar { min-width: 260px; max-width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--misyada-yellow); }
        .nav-link { color: #bdc3c7; padding: 15px 25px; cursor: pointer; text-decoration: none; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-link.active { background: var(--misyada-green); color: var(--misyada-yellow); }

        /* CONTENT AREA */
        .content-area { flex-grow: 1; padding: 30px; padding-bottom: 120px; }
        .id-card {
            width: 500px; height: 315px; background-color: #fff; border-radius: 12px;
            position: relative; overflow: hidden; border: 1px solid #ccc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .photo-frame { position: absolute; background: #eee; overflow: hidden; z-index: 15; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* TEXT STYLES */
        .info-content .dot-item, .info-content .data-item { 
            position: absolute; color: #000; font-weight: 800; 
            white-space: nowrap; z-index: 15; text-transform: uppercase; 
        }
        .info-content .data-item { max-width: 215px; overflow: hidden; text-overflow: ellipsis; }

        /* TEXT SIZES */
        .mode-NISN .dot-item, .mode-NISN .data-item,
        .mode-NUPTK .dot-item, .mode-NUPTK .data-item { font-size: 15px; }
        .mode-NRG .dot-item, .mode-NRG .data-item { font-size: 14px; }

        /* =========================================
           1. KALIBRASI NISN (Update: Foto geser kiri)
           ========================================= */
        .mode-NISN .photo-frame { 
            width: 90px; height: 120px; 
            left: 49px; /* Digeser dari 52px ke 49px */
            top: 158px; border-radius: 4px; 
        }
        .mode-NISN .dot-item { left: 262px; } 
        .mode-NISN .data-item { left: 276px; }
        .mode-NISN .row-1 { top: 154px; } 
        .mode-NISN .row-2 { top: 180px; } 
        .mode-NISN .row-3 { top: 206px; } 
        .mode-NISN .row-4 { top: 232px; } 
        .mode-NISN .row-5 { top: 258px; }

        /* =========================================
           2. KALIBRASI NUPTK (Update: Foto geser kiri)
           ========================================= */
        .mode-NUPTK .photo-frame { 
            width: 107px; height: 160px; 
            left: 25px; /* Digeser dari 28px ke 25px */
            top: 122px; border-radius: 4px; border: 1px solid #ddd; 
        }
        .mode-NUPTK .dot-item { left: 262px; } 
        .mode-NUPTK .data-item { left: 278px; }
        .mode-NUPTK .row-1 { top: 116px; }
        .mode-NUPTK .row-2 { top: 141px; }
        .mode-NUPTK .row-3 { top: 166px; }
        .mode-NUPTK .row-4 { top: 188px; }
        .mode-NUPTK .row-5 { top: 210px; }
        .mode-NUPTK .row-6 { top: 232px; }

        /* =========================================
           3. KALIBRASI NRG (Update: Foto geser kiri)
           ========================================= */
        .mode-NRG .photo-frame { 
            width: 115px; height: 165px; 
            left: 24px; /* Digeser dari 27px ke 24px */
            top: 118px; border-radius: 4px; border: 1px solid #ddd; 
        }
        .mode-NRG .dot-item { left: 255px; } 
        .mode-NRG .data-item { left: 268px; }
        .mode-NRG .row-1 { top: 104px; } 
        .mode-NRG .row-2 { top: 127px; } 
        .mode-NRG .row-3 { top: 150px; } 
        .mode-NRG .row-4 { top: 173px; } 
        .mode-NRG .row-5 { top: 196px; }

        .nrg-top-number { position: absolute; right: 35px; top: 32px; font-weight: 800; font-size: 14px; color: #000; z-index: 20; display: none; }
        .mode-NRG .nrg-top-number { display: block; }

        /* FOOTER DEVELOPER */
        footer {
            background: #fff; padding: 20px; text-align: center; font-size: 13px;
            border-top: 2px solid var(--misyada-yellow); color: #333; position: fixed; bottom: 0; width: 100%; z-index: 100;
        }

        @media print {
            #sidebar, .col-lg-4, .btn, footer { display: none !important; }
            .content-area { padding: 0; }
            .id-card { box-shadow: none !important; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-container">
        <nav id="sidebar">
            <div class="sidebar-header"><h4 class="m-0 text-warning fw-bold">MISYADA</h4></div>
            <div class="nav flex-column mt-3">
                <div class="nav-link active" onclick="switchTab('NISN', event)">KARTU NISN</div>
                <div class="nav-link" onclick="switchTab('NUPTK', event)">KARTU NUPTK</div>
                <div class="nav-link" onclick="switchTab('NRG', event)">KARTU NRG</div>
            </div>
        </nav>

        <main class="content-area">
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card p-4 border-0 shadow-sm rounded-4">
                        <h5 class="fw-bold mb-3">Input Data</h5>
                        <div id="dynamic-inputs"></div>
                        <div class="mb-3">
                            <label class="small fw-bold">Foto Profil</label>
                            <input type="file" id="in-foto" class="form-control" accept="image/*">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary fw-bold" onclick="downloadAll()">UNDUH JPG</button>
                            <button class="btn btn-success fw-bold" onclick="printCard()">CETAK KARTU</button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div id="card-front" class="id-card mode-NISN">
                        <div id="nrg-top" class="nrg-top-number"></div>
                        <div class="photo-frame"><img id="p-img" src=""></div>
                        <div class="info-content" id="p-data-content"></div>
                    </div>
                    <div id="card-back" class="id-card mode-NISN mt-3"></div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p class="m-0"><strong>MISYADA E-Card System - Versi 1</strong><br>
        Developed by <strong>Galeri Famous</strong> | Hak Cipta oleh <strong>MEDIA MISYADA</strong> &copy; 2026.</p>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    const backgrounds = {
        'NISN': { front: 'nisn-depan.png', back: 'nisn-belakang.png' },
        'NUPTK': { front: 'nuptk-depan.png', back: 'nuptk-belakang.png' }, 
        'NRG': { front: 'nrg-depan.png', back: 'nrg-belakang.png' }
    };

    const config = {
        'NISN': ['NISN', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Jenis Kelamin'],
        'NUPTK': ['NUPTK', 'Nama', 'Tempat Lahir', 'Tanggal', 'Kelamin', 'Satminkal'],
        'NRG': ['No. Sertifikat', 'NRG', 'Nama', 'No. Peserta', 'Tahun Lulus', 'Mapel']
    };

    let currentMode = 'NISN';

    function switchTab(mode, event = null) {
        currentMode = mode;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        if (event) event.currentTarget.classList.add('active');
        
        const front = document.getElementById('card-front');
        const back = document.getElementById('card-back');
        front.className = 'id-card mode-' + mode;
        back.className = 'id-card mode-' + mode + ' mt-3';
        front.style.backgroundImage = `url('${backgrounds[mode].front}')`;
        back.style.backgroundImage = `url('${backgrounds[mode].back}')`;
        
        renderInputs();
        updatePreview();
    }

    function renderInputs() {
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = '';
        config[currentMode].forEach((label) => {
            const id = 'in-' + label.replace(/\s/g, '').replace(/\./g, '');
            container.innerHTML += `<div class="mb-2"><label class="small fw-bold">${label}</label><input type="text" id="${id}" class="form-control form-control-sm" oninput="updatePreview()"></div>`;
        });
    }

    function updatePreview() {
        const content = document.getElementById('p-data-content');
        const topNrg = document.getElementById('nrg-top');
        content.innerHTML = '';
        let list = [...config[currentMode]];

        if (currentMode === 'NRG') {
            const cert = document.getElementById('in-NoSertifikat')?.value || '';
            topNrg.innerText = cert.toUpperCase();
            list = list.filter(item => item !== 'No. Sertifikat');
        }

        list.forEach((label, index) => {
            const id = 'in-' + label.replace(/\s/g, '').replace(/\./g, '');
            const val = document.getElementById(id)?.value || '';
            const dot = document.createElement('div');
            dot.className = `dot-item row-${index + 1}`;
            dot.innerText = ':';
            content.appendChild(dot);
            const data = document.createElement('div');
            data.className = `data-item row-${index + 1}`;
            data.innerText = val.toUpperCase();
            content.appendChild(data);
        });
    }

    document.getElementById('in-foto').addEventListener('change', function(e) {
        if(this.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('p-img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    async function downloadAll() {
        const canvas = await html2canvas(document.getElementById('card-front'), { scale: 3 });
        const link = document.createElement('a');
        link.download = `MISYADA-V1-FINAL-${currentMode}-${Date.now()}.jpg`;
        link.href = canvas.toDataURL('image/jpeg');
        link.click();
    }

    function printCard() { window.print(); }
    window.onload = () => switchTab('NISN');
</script>
</body>
</html>
