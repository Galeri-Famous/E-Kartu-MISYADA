<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem E-Kartu MISYADA - Versi 1 Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --sidebar-bg: #112612; --misyada-green: #2e7d32; --misyada-yellow: #fbc02d; }
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f3; margin: 0; display: flex; min-height: 100vh; }
        .wrapper { display: flex; width: 100%; flex-direction: column; }
        .main-container { display: flex; flex-grow: 1; }

        /* SIDEBAR */
        #sidebar { min-width: 260px; max-width: 260px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 3px solid var(--misyada-yellow); }
        .nav-link { color: #bdc3c7; padding: 15px 25px; cursor: pointer; text-decoration: none; display: block; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .nav-link.active { background: var(--misyada-green); color: var(--misyada-yellow); }

        /* CONTENT AREA */
        .content-area { flex-grow: 1; padding: 30px; padding-bottom: 120px; }
        #print-wrapper { display: inline-block; padding: 15px; background: white; border-radius: 8px; }

        .id-card {
            width: 500px; height: 315px; background-color: #eee; border-radius: 12px;
            position: relative; overflow: hidden; border: 1px solid #ccc;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            background-size: 100% 100% !important;
            background-repeat: no-repeat !important;
            background-position: center !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .photo-frame { position: absolute; background: #ddd; overflow: hidden; z-index: 15; }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: none; }

        .info-content .dot-item, .info-content .data-item { 
            position: absolute; color: #000; font-weight: 800; 
            white-space: nowrap; z-index: 15; text-transform: uppercase; 
        }

        /* KALIBRASI POSISI (UPDATE FOTO GESER KIRI) */
        /* NISN */
        .mode-NISN .photo-frame { width: 90px; height: 120px; left: 48px; top: 158px; border-radius: 4px; }
        .mode-NISN .dot-item { left: 262px; font-size: 15px; } 
        .mode-NISN .data-item { left: 276px; font-size: 15px; }
        .mode-NISN .row-1 { top: 154px; } .mode-NISN .row-2 { top: 180px; } .mode-NISN .row-3 { top: 206px; } .mode-NISN .row-4 { top: 232px; } .mode-NISN .row-5 { top: 258px; }

        /* NUPTK */
        .mode-NUPTK .photo-frame { width: 107px; height: 160px; left: 24px; top: 122px; border-radius: 4px; }
        .mode-NUPTK .dot-item { left: 262px; font-size: 15px; } 
        .mode-NUPTK .data-item { left: 278px; font-size: 15px; }
        .mode-NUPTK .row-1 { top: 116px; } .mode-NUPTK .row-2 { top: 141px; } .mode-NUPTK .row-3 { top: 166px; } .mode-NUPTK .row-4 { top: 188px; } .mode-NUPTK .row-5 { top: 210px; } .mode-NUPTK .row-6 { top: 232px; }

        /* NRG (FOTO GESER KIRI & TITIK DUA RAPAT) */
        .mode-NRG .photo-frame { width: 115px; height: 165px; left: 23px; top: 118px; border-radius: 4px; }
        .mode-NRG .dot-item { left: 255px; font-size: 14px; } 
        .mode-NRG .data-item { left: 268px; font-size: 14px; }
        .mode-NRG .row-1 { top: 104px; } .mode-NRG .row-2 { top: 127px; } .mode-NRG .row-3 { top: 150px; } .mode-NRG .row-4 { top: 173px; } .mode-NRG .row-5 { top: 196px; }
        .nrg-top-number { position: absolute; right: 35px; top: 32px; font-weight: 800; font-size: 14px; color: #000; z-index: 20; display: none; }
        .mode-NRG .nrg-top-number { display: block; }

        footer {
            background: #fff; padding: 20px; text-align: center; font-size: 13px;
            border-top: 2px solid var(--misyada-yellow); color: #333; position: fixed; bottom: 0; width: 100%; z-index: 100;
        }

        @media print {
            @page { size: portrait; margin: 0; }
            body { background: white !important; }
            #sidebar, .col-lg-4, .btn, footer { display: none !important; }
            .content-area { padding: 0; margin: 0; width: 100%; }
            .id-card { box-shadow: none !important; border: 1px solid #eee !important; margin: 20px auto !important; display: block !important; }
            #print-wrapper { width: 100%; padding: 0; display: block; text-align: center; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-container">
        <nav id="sidebar">
            <div class="sidebar-header"><h4 class="m-0 text-warning fw-bold">MISYADA</h4></div>
            <div class="nav flex-column mt-3">
                <div class="nav-link active" onclick="switchTab('NISN', event)">KARTU NISN</div>
                <div class="nav-link" onclick="switchTab('NUPTK', event)">KARTU NUPTK</div>
                <div class="nav-link" onclick="switchTab('NRG', event)">KARTU NRG</div>
            </div>
        </nav>

        <main class="content-area">
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card p-4 border-0 shadow-sm rounded-4">
                        <h5 class="fw-bold mb-3">Input Data</h5>
                        <div id="dynamic-inputs"></div>
                        <div class="mb-3">
                            <label class="small fw-bold">Foto Profil</label>
                            <input type="file" id="in-foto" class="form-control" accept="image/*">
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary fw-bold" onclick="downloadFullJPG()">UNDUH JPG (2 SISI)</button>
                            <button class="btn btn-success fw-bold" onclick="printCard()">CETAK KARTU</button>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8 text-center">
                    <div id="print-wrapper">
                        <div id="card-front" class="id-card">
                            <div id="nrg-top" class="nrg-top-number"></div>
                            <div class="photo-frame"><img id="p-img" src=""></div>
                            <div class="info-content" id="p-data-content"></div>
                        </div>
                        <div id="card-back" class="id-card mt-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer>
        <p class="m-0">Developed by <strong>Galeri Famous</strong> | Hak Cipta oleh <strong>MEDIA MISYADA</strong> &copy; 2026.</p>
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    // MASUKKAN LINK REPO ANDA DI SINI
    const GITHUB_BASE = "https://raw.githubusercontent.com/USERNAME/REPO_NAME/main/"; 

    const backgrounds = {
        'NISN': { front: GITHUB_BASE + 'nisn-depan.png', back: GITHUB_BASE + 'nisn-belakang.png' }, 
        'NUPTK': { front: GITHUB_BASE + 'nuptk-depan.png', back: GITHUB_BASE + 'nuptk-belakang.png' }, 
        'NRG': { front: GITHUB_BASE + 'nrg-depan.png', back: GITHUB_BASE + 'nrg-belakang.png' }
    };

    const config = {
        'NISN': ['NISN', 'Nama', 'Tempat Lahir', 'Tanggal Lahir', 'Jenis Kelamin'],
        'NUPTK': ['NUPTK', 'Nama', 'Tempat Lahir', 'Tanggal', 'Kelamin', 'Satminkal'],
        'NRG': ['No. Sertifikat', 'NRG', 'Nama', 'No. Peserta', 'Tahun Lulus', 'Mapel']
    };

    let currentMode = 'NISN';

    function switchTab(mode, event = null) {
        currentMode = mode;
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        if (event) event.currentTarget.classList.add('active');
        
        const front = document.getElementById('card-front');
        const back = document.getElementById('card-back');
        
        front.className = 'id-card mode-' + mode;
        back.className = 'id-card mode-' + mode + ' mt-3';
        
        // Memaksa loading background dari GitHub
        front.style.setProperty('background-image', `url('${backgrounds[mode].front}')`, 'important');
        back.style.setProperty('background-image', `url('${backgrounds[mode].back}')`, 'important');
        
        renderInputs();
        updatePreview();
    }

    function renderInputs() {
        const container = document.getElementById('dynamic-inputs');
        container.innerHTML = '';
        config[currentMode].forEach((label) => {
            const id = 'in-' + label.replace(/\s/g, '').replace(/\./g, '');
            container.innerHTML += `<div class="mb-2"><label class="small fw-bold">${label}</label><input type="text" id="${id}" class="form-control form-control-sm" oninput="updatePreview()"></div>`;
        });
    }

    function updatePreview() {
        const content = document.getElementById('p-data-content');
        const topNrg = document.getElementById('nrg-top');
        content.innerHTML = '';
        let list = [...config[currentMode]];

        if (currentMode === 'NRG') {
            const cert = document.getElementById('in-NoSertifikat')?.value || '';
            topNrg.innerText = cert.toUpperCase();
            list = list.filter(item => item !== 'No. Sertifikat');
        }

        list.forEach((label, index) => {
            const id = 'in-' + label.replace(/\s/g, '').replace(/\./g, '');
            const val = document.getElementById(id)?.value || '';
            const dot = document.createElement('div');
            dot.className = `dot-item row-${index + 1}`;
            dot.innerText = ':';
            content.appendChild(dot);
            const data = document.createElement('div');
            data.className = `data-item row-${index + 1}`;
            data.innerText = val.toUpperCase();
            content.appendChild(data);
        });
    }

    document.getElementById('in-foto').addEventListener('change', function(e) {
        if(this.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('p-img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(this.files[0]);
        }
    });

    async function downloadFullJPG() {
        const element = document.getElementById('print-wrapper');
        try {
            const canvas = await html2canvas(element, { 
                scale: 3, 
                useCORS: true,
                backgroundColor: "#ffffff"
            });
            const link = document.createElement('a');
            link.download = `E-KARTU-${currentMode}-FULL.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        } catch (e) {
            alert("Gagal mengunduh. Pastikan link GitHub di variabel GITHUB_BASE sudah benar.");
        }
    }

    function printCard() { window.print(); }
    window.onload = () => switchTab('NISN');
</script>
</body>
</html>
